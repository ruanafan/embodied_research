<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title | strip_html | escape }} | {% endif %}{{ site.title | escape }}</title>
    <meta name="description" content="{{ site.description | escape }}">
    <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/site.css' | relative_url }}">
  </head>
  <body>
    <a class="kb-skip-link" href="#content">跳到正文</a>
    {% include header.html %}

    <div class="kb-shell">
      {% include sidebar.html %}

      <main id="content" class="kb-content" aria-label="Content">
        {{ content | replace: '<table>', '<div class="kb-table-wrap"><table>' | replace: '</table>', '</table></div>' }}
      </main>
    </div>
  </body>
</html>
